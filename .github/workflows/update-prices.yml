name: Update Prices

on:
  schedule:
    - cron: '0 * * * *'   # Todo início de hora

  workflow_dispatch:

permissions:
  contents: write

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore PriceChecker

      - name: Run
        run: dotnet run --project PriceChecker

      - name: Commit

        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add prices.json

          git diff --cached --quiet || git commit -m "Update prices"

          git push